services:
  wartungskalender:
    image: ${WARTUNGSKALENDER_IMAGE:-ghcr.io/tobayashi-san/maintenance-planner:latest}
    container_name: wartungskalender
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - ./DB:/app/DB
      - ./uploads:/app/uploads
    restart: unless-stopped
