services:
  wartungskalender:
    image: ${WARTUNGSKALENDER_IMAGE:-ghcr.io/tobayashi-san/maintenance-planner:latest}
    container_name: wartungskalender
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: https://${INTERNAL_TLS_HOSTNAME}
      ALLOWED_ORIGIN: https://${INTERNAL_TLS_HOSTNAME}
    expose:
      - "3000"
    env_file:
      - .env
    volumes:
      - ./DB:/app/DB
      - ./uploads:/app/uploads
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: wartungskalender-internal-tls
    depends_on:
      - wartungskalender
    ports:
      - "80:80"
      - "443:443"
    environment:
      INTERNAL_TLS_HOSTNAME: ${INTERNAL_TLS_HOSTNAME}
    command:
      - /bin/sh
      - -ec
      - |
        cat >/etc/caddy/Caddyfile <<'EOF'
        {$INTERNAL_TLS_HOSTNAME} {
            encode gzip zstd
            tls internal

            handle /downloads/internal-root-ca.crt {
                root * /data/caddy/pki/authorities/local
                rewrite * /root.crt
                header Content-Type application/x-x509-ca-cert
                header Content-Disposition "attachment; filename=\"wartungskalender-root-ca.crt\""
                file_server
            }

            reverse_proxy wartungskalender:3000 {
                header_up X-Forwarded-Host {host}
                header_up X-Forwarded-Proto {scheme}
            }
        }
        EOF
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - ./caddy_internal_data:/data
      - ./caddy_internal_config:/config
    restart: unless-stopped
